# ─── RDFSolve SSSOM source registry ─────────────────────────────────────────
#
# Each entry defines an SSSOM mapping bundle for import into the rdfsolve
# database.  The ``rdfsolve sssom seed`` CLI command reads this file,
# downloads the archive, extracts every *.sssom.tsv file inside it,
# converts each one to a SsomMapping JSON-LD file, and writes the results to
# the configured output directory.
#
# Fields
# ──────
#   name        - unique identifier; used as the output file prefix and as the
#                 source_name recorded in every mapping edge
#   provider    - human-readable provider / organisation name
#   url         - direct download URL; may be a .tgz, .tar.gz, .zip, or a
#                 plain .sssom.tsv file
#   description - optional free-text description
#   license     - SPDX expression or URL (optional)
#   homepage    - upstream homepage (optional)
#   type        - optional, one of {class_mappings, property_mappings}; if
#                 absent, the entry is treated as a class/instance mapping.
#   mapping_type - one of {instance, class}; controls @about.mapping_type in
#                 the output JSON-LD.  Only meaningful for entity/class-level
#                 sources.  Property-mapping entries (type: property_mappings)
#                 are handled by a separate pipeline and do NOT carry this
#                 field.

- name: ols_mappings
  provider: "EMBL-EBI (UK)"
  mapping_type: instance
  url: "https://ftp.ebi.ac.uk/pub/databases/spot/ols/latest/sssom.tgz"
  description: >-
    OLS (Ontology Lookup Service) cross-ontology mappings exported in SSSOM
    format by EMBL-EBI.  Each .sssom.tsv file inside the archive covers one
    source ontology and maps its terms to equivalent or related terms in other
    ontologies.
  license: "https://www.ebi.ac.uk/about/terms-of-use"
  homepage: "https://www.ebi.ac.uk/ols4"



