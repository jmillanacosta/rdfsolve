# ─── RDFSolve source registry ────────────────────────────────────
#
# Each entry defines a SPARQL data source for schema mining.
#
# Fields
# ------
# name           : unique identifier (required)
# endpoint       : SPARQL endpoint URL (omit if unavailable)
# void_iri       : VoID root resource IRI
# graph_uris     : list of named-graph IRIs to query
# use_graph      : wrap queries in GRAPH clause (default false)
# two_phase      : use two-phase mining      (default true)
#
# Optional tuning overrides (only set when non-default):
#   chunk_size, class_batch_size, class_chunk_size,
#   timeout, delay, counts, unsafe_paging
#
# notes          : free-text annotation
# in_kamdar      : true if also mined in Kamdar & Musen (2021)
#
# Whole-database entries (``*.all``) live in ``sources_all.yaml``.
# ─────────────────────────────────────────────────────────────────

# ═══════════════════════════════════════════════════════════════════
# Standalone endpoints
# ═══════════════════════════════════════════════════════════════════

- name: aopwikirdf
  endpoint: https://aopwiki.rdf.bigcat-bioinformatics.org/sparql/
  void_iri: http://aopwiki.org/
  graph_uris:
    - http://aopwiki.org/

- name: wikipathways
  endpoint: https://sparql.wikipathways.org/sparql/
  void_iri: http://rdf.wikipathways.org/
  graph_uris:
    - http://rdf.wikipathways.org/
  in_kamdar: true
  download_owl: https://download.bio2rdf.org/files/release/3/wikipathways/wikipathways.schema.owl

